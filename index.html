<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salida de Carrozas J.R. — Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="db.js"></script>
<style>
:root{--ink:#16162a;--gold:#c9a84c;--gl:#e8c97a;--w:#f9f9fc;}
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;background:var(--ink);font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(201,168,76,.07) 0%,transparent 70%),radial-gradient(ellipse 50% 60% at 80% 80%,rgba(44,74,124,.1) 0%,transparent 70%);pointer-events:none;}
body::after{content:'+';position:fixed;font-size:400px;font-family:'Playfair Display',serif;color:rgba(255,255,255,.012);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;user-select:none;line-height:1;}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:48px 44px 40px;width:420px;max-width:95vw;backdrop-filter:blur(20px);animation:fadeUp .6s ease both;position:relative;z-index:1;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.logo-area{text-align:center;margin-bottom:32px;}
.logo-icon{width:56px;height:56px;margin:0 auto 14px;display:block;}
.logo-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--w);letter-spacing:.02em;}
.logo-sub{font-size:11px;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;margin-top:5px;font-weight:500;}
.divider{height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,.4),transparent);margin:0 auto 28px;width:80%;}
.role-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4);font-weight:500;margin-bottom:10px;display:block;}
.roles{display:flex;gap:8px;margin-bottom:22px;}
.role-btn{flex:1;padding:11px 6px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.45);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;text-align:center;line-height:1.4;}
.role-btn .ri{display:block;font-size:18px;margin-bottom:4px;}
.role-btn:hover{border-color:rgba(255,255,255,.22);color:rgba(255,255,255,.75);}
.role-btn.sel-admin   {background:rgba(44,74,124,.3); border-color:rgba(100,140,200,.55);color:#a8c0e8;}
.role-btn.sel-driver  {background:rgba(26,92,58,.3);  border-color:rgba(80,160,100,.55); color:#90d4a0;}
.role-btn.sel-regional{background:rgba(92,58,26,.3);  border-color:rgba(180,120,60,.55); color:#e8b870;}
.field{margin-bottom:16px;}
label{display:block;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);font-weight:500;margin-bottom:7px;}
input[type=text],input[type=password]{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 16px;color:var(--w);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s,background .2s;}
input::placeholder{color:rgba(255,255,255,.22);}
input:focus{border-color:rgba(201,168,76,.5);background:rgba(255,255,255,.07);}
.err{background:rgba(192,64,64,.14);border:1px solid rgba(192,64,64,.3);color:#f09090;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none;}
.btn-login{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--gold),var(--gl));color:var(--ink);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:4px;}
.btn-login:hover{opacity:.9;transform:translateY(-1px);}
.footer{text-align:center;color:rgba(255,255,255,.18);font-size:11px;margin-top:24px;}

/* Dashboard */
.dash{display:none;position:fixed;inset:0;background:var(--ink);z-index:100;overflow-y:auto;animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.dash-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:0;background:rgba(22,22,42,.97);backdrop-filter:blur(12px);z-index:10;}
.dash-brand{font-family:'Playfair Display',serif;color:var(--w);font-size:17px;display:flex;align-items:center;gap:8px;}
.dash-brand .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);}
.pill{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;letter-spacing:.06em;}
.pill-admin   {background:rgba(44,74,124,.3); color:#a8c0e8;}
.pill-driver  {background:rgba(26,92,58,.3);  color:#90d4a0;}
.pill-regional{background:rgba(92,58,26,.3);  color:#e8b870;}
.dash-user{display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,.5);}
.btn-out{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.45);border-radius:7px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-out:hover{background:rgba(255,255,255,.1);color:var(--w);}
.dash-body{padding:28px 20px 60px;max-width:960px;margin:0 auto;}
.welcome h2{font-family:'Playfair Display',serif;font-size:26px;color:var(--w);font-weight:400;margin-bottom:6px;}
.welcome p{color:rgba(255,255,255,.38);font-size:14px;margin-bottom:28px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
.dash-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:22px 18px;cursor:pointer;transition:all .22s;text-decoration:none;display:block;color:var(--w);}
.dash-card:hover{background:rgba(255,255,255,.07);border-color:rgba(201,168,76,.3);transform:translateY(-2px);}
.card-icon{font-size:26px;margin-bottom:12px;display:block;}
.dash-card h3{font-size:14px;font-weight:500;color:var(--w);margin-bottom:6px;}
.dash-card p{font-size:12px;color:rgba(255,255,255,.35);line-height:1.5;margin-bottom:10px;}
.card-btn{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:6px;background:rgba(201,168,76,.15);color:var(--gold);}
.card-btn.soon{background:rgba(255,255,255,.06);color:rgba(255,255,255,.3);}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="card" id="login-card">
  <div class="logo-area">
    <svg class="logo-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="28" cy="28" r="27" stroke="rgba(201,168,76,0.4)" stroke-width="1"/>
      <path d="M12 35L12 26Q12 22 16 22L40 22Q44 22 44 26L44 35Z" fill="rgba(201,168,76,0.12)" stroke="rgba(201,168,76,0.65)" stroke-width="1"/>
      <path d="M15 26L15 22Q15 18 18 18L22 18L22 22" stroke="rgba(201,168,76,0.5)" stroke-width="1" fill="none"/>
      <path d="M28 18L28 22" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
      <rect x="23" y="25" width="10" height="6" rx="1" fill="rgba(201,168,76,0.25)" stroke="rgba(201,168,76,0.5)" stroke-width="0.8"/>
      <circle cx="18" cy="36" r="3.5" fill="rgba(201,168,76,0.18)" stroke="rgba(201,168,76,0.7)" stroke-width="1"/>
      <circle cx="38" cy="36" r="3.5" fill="rgba(201,168,76,0.18)" stroke="rgba(201,168,76,0.7)" stroke-width="1"/>
    </svg>
    <div class="logo-title" id="app-nombre">Salida de Carrozas J.R.</div>
    <div class="logo-sub">Sistema de traslados</div>
  </div>
  <div class="divider"></div>

  <span class="role-label">Selecciona tu rol</span>
  <div class="roles">
    <button class="role-btn" id="rbtn-admin"    onclick="setRol('admin')">   <span class="ri">🏢</span>Administrador</button>
    <button class="role-btn" id="rbtn-driver"   onclick="setRol('driver')">  <span class="ri">🚗</span>Conductor</button>
    <button class="role-btn" id="rbtn-regional" onclick="setRol('regional')"><span class="ri">📍</span>Coordinador</button>
  </div>

  <div class="field"><label>Usuario</label><input type="text"     id="inp-user" placeholder="Nombre de usuario" onkeydown="if(event.key==='Enter')doLogin()"/></div>
  <div class="field"><label>Contraseña</label><input type="password" id="inp-pass" placeholder="••••••••"           onkeydown="if(event.key==='Enter')doLogin()"/></div>

  <div class="err" id="err-msg"></div>
  <button class="btn-login" onclick="doLogin()">Ingresar al sistema</button>
  <div class="footer">Todos los datos se guardan localmente en este navegador</div>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dashboard">
  <div class="dash-hdr">
    <div class="dash-brand"><div class="dot"></div><span id="dash-nombre">Salida de Carrozas J.R.</span></div>
    <div class="dash-user">
      <span id="dash-user-label"></span>
      <span class="pill" id="dash-pill"></span>
      <button class="btn-out" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="dash-body">
    <div class="welcome">
      <h2 id="dash-bienvenida">¡Bienvenido!</h2>
      <p  id="dash-sub">Selecciona una opción.</p>
    </div>
    <div class="cards-grid" id="dash-cards"></div>
  </div>
</div>

<script>
DB.init();

// Actualizar nombre desde sistema
const sis = DB.getSistema();
if (sis.nombre) document.getElementById('app-nombre').textContent = sis.nombre;

let rolSeleccionado = null;

const menus = {
  admin: [
    { icon:'🗺️', title:'Mapa en tiempo real',     desc:'Ve todas las carrozas activas.',            link:'mapa_seguimiento.html' },
    { icon:'📋', title:'Panel administración',    desc:'Resumen, traslados y estadísticas.',         link:'panel_admin.html' },
    { icon:'🚗', title:'Registro de salidas',     desc:'Registra la salida de una carroza.',         link:'registro_salida.html' },
    { icon:'🔧', title:'Averías y mantenimiento', desc:'Reporta y gestiona averías de la flota.',    link:'averias_mantenimiento.html' },
    { icon:'🆘', title:'Apoyo coordinador',       desc:'Solicitudes de apoyo entre regionales.',     link:'apoyo_regional.html' },
    { icon:'⚙️', title:'Configuración',           desc:'Usuarios, carrozas, regionales y sistema.',  link:'configuracion.html' },
  ],
  driver: [
    { icon:'🚗', title:'Registrar salida',        desc:'Registra la salida de tu carroza.',          link:'registro_salida.html' },
    { icon:'📩', title:'Solicitudes de apoyo',    desc:'Ver y aceptar solicitudes de otras regionales.', link:'apoyo_regional.html' },
    { icon:'🗺️', title:'Mi ruta activa',          desc:'Ver tu recorrido en tiempo real.',           link:'mapa_seguimiento.html' },
    { icon:'🔧', title:'Reportar avería',         desc:'Reporta un problema con tu carroza.',        link:'averias_mantenimiento.html' },
  ],
  regional: [
    { icon:'🆘', title:'Solicitar apoyo',         desc:'Pide apoyo de otras regionales.',            link:'apoyo_regional.html' },
    { icon:'🗺️', title:'Seguimiento',             desc:'Monitorea traslados en el mapa.',            link:'mapa_seguimiento.html' },
    { icon:'🚗', title:'Registrar salida',        desc:'Registra la salida de una carroza.',         link:'registro_salida.html' },
    { icon:'📊', title:'Panel coordinador',       desc:'Estadísticas de tu regional.',               link:'panel_admin.html' },
  ],
};

const rolInfo = {
  admin:   { label:'Administrador', pillClass:'pill-admin',    btnClass:'sel-admin' },
  driver:  { label:'Conductor',     pillClass:'pill-driver',   btnClass:'sel-driver' },
  regional:{ label:'Coordinador',   pillClass:'pill-regional', btnClass:'sel-regional' },
};

function setRol(rol) {
  rolSeleccionado = rol;
  document.querySelectorAll('.role-btn').forEach(b => b.className = 'role-btn');
  document.getElementById('rbtn-' + rol).classList.add(rolInfo[rol].btnClass);
}

function doLogin() {
  const usuario = document.getElementById('inp-user').value.trim().toLowerCase();
  const pass    = document.getElementById('inp-pass').value;
  const err     = document.getElementById('err-msg');
  err.style.display = 'none';

  if (!rolSeleccionado) {
    err.textContent = 'Selecciona tu rol primero.';
    err.style.display = 'block'; return;
  }
  if (!usuario || !pass) {
    err.textContent = 'Ingresa usuario y contraseña.';
    err.style.display = 'block'; return;
  }

  // Buscar en la base de datos
  const user = DB.getUsuarios().find(u =>
    u.usuario === usuario && u.pass === pass && u.rol === rolSeleccionado && u.estado === 'activo'
  );

  if (!user) {
    err.textContent = 'Usuario, contraseña o rol incorrectos.';
    err.style.display = 'block'; return;
  }

  // Guardar sesión
  sessionStorage.setItem('jrapp_session', JSON.stringify({ id: user.id, nombre: user.nombre, rol: user.rol, regional: user.regional }));
  mostrarDashboard(user);
}

function mostrarDashboard(user) {
  const info = rolInfo[user.rol];
  const sis  = DB.getSistema();
  document.getElementById('dash-nombre').textContent = sis.nombre || 'Salida de Carrozas J.R.';
  document.getElementById('dash-user-label').textContent = user.nombre;
  document.getElementById('dash-pill').textContent  = info.label;
  document.getElementById('dash-pill').className    = 'pill ' + info.pillClass;
  document.getElementById('dash-bienvenida').textContent = '¡Hola, ' + user.nombre.split(' ')[0] + '!';
  document.getElementById('dash-sub').textContent = user.rol === 'admin'
    ? 'Gestiona traslados, conductores y regionales.'
    : user.rol === 'driver'
    ? 'Registra salidas, acepta solicitudes y actualiza tu ruta.'
    : 'Solicita apoyo y monitorea traslados activos.';

  const grid = document.getElementById('dash-cards');
  grid.innerHTML = '';
  (menus[user.rol] || []).forEach(item => {
    const a = document.createElement('a');
    a.className = 'dash-card';
    a.href = item.link || '#';
    a.innerHTML = `
      <span class="card-icon">${item.icon}</span>
      <h3>${item.title}</h3>
      <p>${item.desc}</p>
      <span class="card-btn${item.link?'':' soon'}">${item.link?'ABRIR':'PRÓXIMAMENTE'}</span>`;
    grid.appendChild(a);
  });

  document.getElementById('login-card').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
}

function doLogout() {
  sessionStorage.removeItem('jrapp_session');
  rolSeleccionado = null;
  document.querySelectorAll('.role-btn').forEach(b => b.className = 'role-btn');
  document.getElementById('inp-user').value = '';
  document.getElementById('inp-pass').value = '';
  document.getElementById('err-msg').style.display = 'none';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-card').style.display = 'block';
}

// Auto-login si hay sesión activa
window.addEventListener('DOMContentLoaded', () => {
  DB.init();
  const sess = sessionStorage.getItem('jrapp_session');
  if (sess) {
    try {
      const s = JSON.parse(sess);
      const user = DB.getUsuarios().find(u => u.id === s.id && u.estado === 'activo');
      if (user) { mostrarDashboard(user); }
    } catch {}
  }
});
</script>
</body>
</html>
